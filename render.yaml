services:
  - type: web
    name: foid-openbanking
    runtime: python
    rootDir: openbanking          # all commands run from here
    region: oregon                # change to frankfurt or singapore if closer

    # ── Build command ─────────────────────────────────────────────────────────
    # Runs once before each deploy, inside rootDir.
    buildCommand: pip install uv && uv sync --frozen --no-dev --extra postgres

    # ── Start command ─────────────────────────────────────────────────────────
    # Render injects $PORT. Must bind 0.0.0.0 so Render's proxy can reach it.
    # Use `python -m uvicorn` so the CWD is always correct regardless of Render's
    # virtual env activation order.
    startCommand: uv run python -m uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1

    # ── Health check ──────────────────────────────────────────────────────────
    healthCheckPath: /health

    # ── Environment variables ─────────────────────────────────────────────────
    # Non-secret defaults. Set JWT_SECRET + DATABASE_URL in the Render dashboard.
    envVars:
      - key: POLL_INTERVAL_SECONDS
        value: "300"

      - key: FEED_APPEND_SECONDS
        value: "30"

      - key: DB_ECHO
        value: "false"

      - key: CORS_ORIGINS
        value: "*"             # tighten to your frontend URL after first deploy

      # ── Secrets — set these in the Render dashboard Environment tab ────────
      # - key: JWT_SECRET
      #   value: <generate: python3 -c "import secrets; print(secrets.token_hex(32))">
      #
      # - key: DATABASE_URL
      #   value: sqlite+aiosqlite:////data/foid_openbanking.db  ← SQLite + disk
      #     OR
      #   value: postgresql+asyncpg://user:pass@host:5432/foid  ← Render Postgres

    # ── Persistent disk ───────────────────────────────────────────────────────
    # Keeps the SQLite DB file across redeploys.
    # Requires Starter plan ($7/mo). On free tier: use Render's free Postgres.
    disk:
      name: foid-sqlite-data
      mountPath: /data
      sizeGB: 1
